name: Validate Vite web app

on:
  pull_request:
    branches: [main]
  push:
    branches: [fix/supabase-codex-web]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout without reusable actions
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout --detach FETCH_HEAD

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Install locked dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Build Vite app
        run: npm run build

      - name: Validate Codex worker syntax
        run: node --check services/codex-worker/server.mjs
