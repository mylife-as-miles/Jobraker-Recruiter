edition: 3.0.0
name: jobraker-qwen-autopilot
access: default

vars:
  region: us-west-1

resources:
  qwenAutopilot:
    component: fc3
    props:
      region: ${vars.region}
      functionName: jobraker-qwen-autopilot
      description: Jobraker Recruiter Track 4 Autopilot backend using Alibaba Cloud Qwen
      runtime: custom-container
      timeout: 60
      memorySize: 512
      cpu: 0.5
      diskSize: 512
      code: .
      customContainerConfig:
        port: 8080
      environmentVariables:
        NODE_ENV: production
        PORT: '8080'
        DASHSCOPE_API_KEY: ${env(DASHSCOPE_API_KEY)}
        DASHSCOPE_BASE_URL: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
        DASHSCOPE_MODEL: qwen3.7-plus
      triggers:
        - triggerName: http
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
